<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0f172a">
  <title>סורק ברקודים</title>
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
      background: #0f172a;
      color: white;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* ===== מסך סריקה ===== */
    #scanner-screen {
      width: 100%;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 20px;
      gap: 20px;
    }

    .app-title {
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .app-subtitle {
      font-size: 0.9rem;
      color: #94a3b8;
      text-align: center;
    }

    /* מסגרת המצלמה */
    #reader-wrapper {
      width: 100%;
      max-width: 360px;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.5), 0 20px 60px rgba(0,0,0,0.5);
      background: #000;
      position: relative;
    }

    #reader {
      width: 100%;
    }

    /* עיצוב override לסורק */
    #reader video {
      border-radius: 0 !important;
    }

    #reader__scan_region {
      background: transparent !important;
    }

    #reader__dashboard {
      padding: 10px !important;
      background: #1e293b !important;
    }

    #reader__dashboard_section_swaplink {
      color: #818cf8 !important;
    }

    #reader__camera_selection {
      background: #0f172a;
      color: white;
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 6px 10px;
      font-size: 0.85rem;
      width: 100%;
    }

    #reader__status_span {
      color: #94a3b8 !important;
      font-size: 0.8rem !important;
    }

    button#html5-qrcode-button-camera-permission,
    button#html5-qrcode-button-camera-start,
    button#html5-qrcode-button-camera-stop {
      background: #6366f1 !important;
      color: white !important;
      border: none !important;
      border-radius: 10px !important;
      padding: 10px 20px !important;
      font-size: 0.9rem !important;
      cursor: pointer !important;
      margin: 6px 0 !important;
      width: 100% !important;
    }

    .hint-text {
      font-size: 0.85rem;
      color: #475569;
      text-align: center;
    }

    /* ===== מסך תוצאה ===== */
    #result-screen {
      display: none;
      width: 100%;
      height: 100dvh;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
      text-align: center;
      transition: background 0.3s ease;
    }

    #result-screen.valid {
      background: linear-gradient(135deg, #14532d 0%, #16a34a 100%);
    }

    #result-screen.invalid {
      background: linear-gradient(135deg, #7f1d1d 0%, #dc2626 100%);
    }

    .result-icon {
      font-size: 6rem;
      margin-bottom: 24px;
      filter: drop-shadow(0 4px 20px rgba(0,0,0,0.3));
      animation: pop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    @keyframes pop {
      from { transform: scale(0); opacity: 0; }
      to   { transform: scale(1); opacity: 1; }
    }

    .result-title {
      font-size: 3rem;
      font-weight: 800;
      letter-spacing: -1px;
      margin-bottom: 12px;
    }

    .result-label {
      font-size: 1rem;
      opacity: 0.7;
      margin-bottom: 8px;
    }

    .result-code {
      font-size: 1.1rem;
      font-family: 'Courier New', monospace;
      background: rgba(0, 0, 0, 0.25);
      padding: 10px 20px;
      border-radius: 12px;
      margin-bottom: 48px;
      word-break: break-all;
      max-width: 320px;
      letter-spacing: 1px;
    }

    .scan-again-btn {
      background: white;
      color: #1e293b;
      border: none;
      padding: 16px 48px;
      font-size: 1.1rem;
      font-weight: 700;
      border-radius: 50px;
      cursor: pointer;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.25);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    .scan-again-btn:active {
      transform: scale(0.97);
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
    }
  </style>
</head>
<body>

  <!-- מסך סריקה -->
  <div id="scanner-screen">
    <div class="app-title">סורק ברקודים</div>
    <div id="reader-wrapper">
      <div id="reader"></div>
    </div>
    <div class="hint-text">כוון את המצלמה לברקוד לסריקה אוטומטית</div>
  </div>

  <!-- מסך תוצאה -->
  <div id="result-screen">
    <div class="result-icon" id="result-icon"></div>
    <div class="result-title" id="result-title"></div>
    <div class="result-label">קוד שנסרק:</div>
    <div class="result-code" id="result-code"></div>
    <button class="scan-again-btn" onclick="scanAgain()">סרוק שוב</button>
  </div>

  <script>
    let VALID_BARCODES = [];
    let scanner = null;
    let scanning = false;

    // טעינת הרשימה מהקובץ החיצוני
    fetch("barcodes.json")
      .then(res => res.json())
      .then(data => { VALID_BARCODES = data; })
      .catch(() => console.error("שגיאה בטעינת רשימת הברקודים"));

    function startScanner() {
      if (scanning) return;
      scanning = true;

      scanner = new Html5Qrcode("reader");

      scanner.start(
        { facingMode: "environment" },
        {
          fps: 10,
          qrbox: { width: 260, height: 180 },
          aspectRatio: 1.4,
          formatsToSupport: [
            Html5QrcodeSupportedFormats.QR_CODE,
            Html5QrcodeSupportedFormats.EAN_13,
            Html5QrcodeSupportedFormats.EAN_8,
            Html5QrcodeSupportedFormats.CODE_128,
            Html5QrcodeSupportedFormats.CODE_39,
            Html5QrcodeSupportedFormats.UPC_A,
            Html5QrcodeSupportedFormats.UPC_E,
            Html5QrcodeSupportedFormats.DATA_MATRIX,
          ]
        },
        onScanSuccess,
        () => {} // שגיאות סריקה רגילות - לא להציג
      ).catch(err => {
        console.error("שגיאה בפתיחת המצלמה:", err);
        scanning = false;
      });
    }

    function onScanSuccess(decodedText) {
      if (!scanning) return;
      scanning = false;

      // רטט קצר אם הדפדפן תומך
      if (navigator.vibrate) navigator.vibrate(100);

      scanner.stop().then(() => {
        showResult(decodedText);
      }).catch(() => {
        showResult(decodedText);
      });
    }

    function showResult(code) {
      const isValid = VALID_BARCODES.includes(code.trim());

      document.getElementById("result-icon").textContent  = isValid ? "✅" : "❌";
      document.getElementById("result-title").textContent = isValid ? "תקין" : "לא תקין";
      document.getElementById("result-code").textContent  = code;

      const resultScreen  = document.getElementById("result-screen");
      const scannerScreen = document.getElementById("scanner-screen");

      resultScreen.className = isValid ? "valid" : "invalid";
      scannerScreen.style.display = "none";
      resultScreen.style.display  = "flex";
    }

    function scanAgain() {
      document.getElementById("result-screen").style.display  = "none";
      document.getElementById("scanner-screen").style.display = "flex";
      startScanner();
    }

    // הפעל סריקה בטעינה
    startScanner();
  </script>

</body>
</html>
